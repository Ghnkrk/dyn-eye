version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - PORT=8501
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - dyneye-net
    command: python main.py dashboard
    restart: unless-stopped

networks:
  dyneye-net:
    driver: bridge
